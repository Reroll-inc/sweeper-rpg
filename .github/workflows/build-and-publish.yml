name: Build and Publish to Itch.io

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.0.0)"
        required: true
        default: "1.0.0"

env:
  GAME_NAME: "Sweeper RPG"
  ITCH_USERNAME: ${{ secrets.ITCH_USERNAME }}
  ITCH_GAME_ID: ${{ secrets.ITCH_GAME_ID }}
  BUILD_CONFIGURATION: "Release"

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Publish
        run: |
          dotnet publish ./SweeperRpg/SweeperRpg.csproj `
            --configuration ${{ env.BUILD_CONFIGURATION }} `
            --runtime win-x64 `
            --self-contained true `
            --output ./publish `
            -p:Version=${{ github.event.inputs.version || '1.0.0' }} `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path ./publish/* -DestinationPath ./game-build.zip

      - name: Setup Butler
        run: |
          $butlerDir = "$env:USERPROFILE\.butler"
          if (!(Test-Path $butlerDir)) {
            New-Item -ItemType Directory -Path $butlerDir -Force
          }

          $latestRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/itchio/butler/releases/latest"
          $asset = $latestRelease.assets | Where-Object { $_.name -like "*windows-amd64.zip" } | Select-Object -First 1

          if ($asset) {
            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "$butlerDir\butler.zip"
            Expand-Archive -Path "$butlerDir\butler.zip" -DestinationPath $butlerDir -Force
            Remove-Item "$butlerDir\butler.zip"
            
            if (Test-Path "$butlerDir\butler.exe") {
              Write-Host "Butler installed successfully at: $butlerDir\butler.exe"
              & "$butlerDir\butler.exe" --version
            } else {
              $found = Get-ChildItem -Path $butlerDir -Recurse -Filter "butler.exe" | Select-Object -First 1
              if ($found) {
                Write-Host "Found Butler at: $($found.FullName)"
                Move-Item -Path $found.FullName -Destination "$butlerDir\butler.exe" -Force
              } else {
                Write-Host "Butler directory contents:"
                Get-ChildItem -Path $butlerDir -Recurse | ForEach-Object { Write-Host $_.FullName }
                Write-Error "Butler.exe not found after extraction"
                exit 1
              }
            }
          } else {
            Write-Error "Could not find Butler Windows binary"
            exit 1
          }

      - name: Push to itch.io (Stable Channel)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          $butlerPath = "$env:USERPROFILE\.butler\butler.exe"
          $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
          Write-Host "Pushing to itch.io (stable): $version"
          & $butlerPath push ./game-build.zip "$env:ITCH_USERNAME/$env:ITCH_GAME_ID:windows-stable" --userversion $version

      - name: Push to itch.io (Beta Channel)
        if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          $butlerPath = "$env:USERPROFILE\.butler\butler.exe"
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          Write-Host "Pushing to itch.io (beta): beta-$shortSha"
          & $butlerPath push ./game-build.zip "$env:ITCH_USERNAME/$env:ITCH_GAME_ID:windows-beta" --userversion "beta-$shortSha"

      - name: Push to itch.io (Manual Trigger)
        if: github.event_name == 'workflow_dispatch'
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          $butlerPath = "$env:USERPROFILE\.butler\butler.exe"
          Write-Host "Pushing to itch.io (manual): ${{ github.event.inputs.version }}"
          & $butlerPath push ./game-build.zip "$env:ITCH_USERNAME/$env:ITCH_GAME_ID:windows-manual" --userversion "${{ github.event.inputs.version }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-build-${{ github.sha }}
          path: ./game-build.zip
